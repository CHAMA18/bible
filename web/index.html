<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Holy Bible – Divine Word & Devotions">
  
  <!-- Mobile viewport settings - critical for device-accurate rendering -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Holy Bible – Divine Word & Devotions">
  <meta name="format-detection" content="telephone=no">
  
  <!-- Google Sign-In Client ID -->
  <meta name="google-signin-client_id" content="YOUR_WEB_CLIENT_ID.apps.googleusercontent.com">
  
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  
  <title>Holy Bible – Divine Word & Devotions</title>
  
  <style>
    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: auto;
    }

    /* iPhone 16 Device Frame - Exact dimensions */
    #device-frame {
      position: relative;
      width: 393px;
      height: 852px;
      border-radius: 50px;
      background: #0a0a0a;
      box-shadow: 
        0 0 0 4px #1a1a1a,
        0 0 0 5px #333,
        0 0 0 7px #1a1a1a,
        0 0 0 8px #222,
        0 30px 80px rgba(0,0,0,0.6),
        inset 0 0 2px rgba(255,255,255,0.1);
      overflow: hidden;
    }

    /* Inner bezel */
    #device-frame::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50px;
      border: 3px solid #1a1a1a;
      pointer-events: none;
      z-index: 100;
    }

    /* Dynamic Island */
    #device-frame::after {
      content: '';
      position: absolute;
      top: 11px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 35px;
      background: #000;
      border-radius: 20px;
      z-index: 200;
    }

    /* Screen container - where Flutter renders */
    #screen-container {
      position: absolute;
      top: 11px;
      left: 11px;
      right: 11px;
      bottom: 11px;
      background: #FBF9F4;
      border-radius: 40px;
      overflow: hidden;
    }

    /* Flutter view fills screen exactly like device */
    #screen-container flutter-view,
    #screen-container > flt-glass-pane,
    #screen-container > flt-renderer {
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      overflow: hidden !important;
      transform: none !important;
    }

    /* Status bar area (inside screen, below Dynamic Island) */
    #status-bar-space {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 54px;
      background: transparent;
      z-index: 50;
      pointer-events: none;
    }

    /* Home indicator */
    #home-indicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 140px;
      height: 5px;
      background: rgba(0,0,0,0.4);
      border-radius: 3px;
      z-index: 150;
    }

    /* Loading screen - matches device screen exactly */
    #loading-screen {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #FBF9F4;
      color: #6B0109;
      font-family: Georgia, 'Times New Roman', serif;
      z-index: 300;
      transition: opacity 0.4s ease;
    }
    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    #loading-screen .logo-text {
      font-size: 22px;
      font-weight: 600;
      font-style: italic;
      letter-spacing: -0.5px;
      margin-bottom: 24px;
    }
    #loading-screen .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #E4E2DD;
      border-top-color: #6B0109;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Page title above device */
    #device-label {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: #555;
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-weight: 500;
      white-space: nowrap;
    }

    /* Mobile: Full screen, no frame */
    @media (max-width: 500px) {
      body {
        background: #FBF9F4;
        padding: 0;
      }
      #device-frame {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        border-radius: 0;
        box-shadow: none;
      }
      #device-frame::before,
      #device-frame::after,
      #home-indicator { display: none; }
      #screen-container {
        top: 0; left: 0; right: 0; bottom: 0;
        border-radius: 0;
      }
      #status-bar-space { height: 47px; }
      #device-label { display: none; }
    }
  </style>
</head>
<body>
  <div id="device-frame">
    <div id="screen-container">
      <div id="status-bar-space"></div>
      <div id="loading-screen">
        <div class="logo-text">Holy Bible</div>
        <div class="spinner"></div>
      </div>
    </div>
    <div id="home-indicator"></div>
  </div>
  <div id="device-label">iPhone 16</div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    var screenContainer = document.getElementById('screen-container');
    
    // Move Flutter elements inside screen container
    var observer = new MutationObserver(function(mutations) {
      for (var i = 0; i < mutations.length; i++) {
        for (var j = 0; j < mutations[i].addedNodes.length; j++) {
          var node = mutations[i].addedNodes[j];
          var tag = node.tagName || '';
          if (tag === 'FLUTTER-VIEW' || tag === 'FLT-GLASS-PANE' || 
              tag === 'FLT-RENDERER' || (tag.toLowerCase().includes('flt'))) {
            screenContainer.appendChild(node);
          }
        }
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });

    // Hide loading screen
    window.addEventListener('flutter-first-frame', function() {
      var ls = document.getElementById('loading-screen');
      if (ls) { ls.classList.add('fade-out'); setTimeout(function() { ls.remove(); }, 500); }
    });
  </script>
</body>
</html>
