<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Holy Bible – Divine Word & Devotions">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Holy Bible – Divine Word & Devotions">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <title>Holy Bible – Divine Word & Devotions</title>
  <style>
    body { margin: 0; background: #FBF9F4; }
    #loading-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #FBF9F4; color: #6B0109;
      font-family: Georgia, 'Times New Roman', serif;
      z-index: 99999; transition: opacity 0.4s ease;
    }
    #loading-screen.fade-out { opacity: 0; pointer-events: none; }
    #loading-screen .logo-text {
      font-size: 24px; font-weight: 600;
      font-style: italic; letter-spacing: -0.5px;
      margin-bottom: 32px;
    }
    #loading-screen .spinner {
      width: 32px; height: 32px;
      border: 3px solid #E4E2DD;
      border-top-color: #6B0109;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="logo-text">Holy Bible</div>
    <div class="spinner"></div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var ls = document.getElementById('loading-screen');
      if (ls) { ls.classList.add('fade-out'); setTimeout(function() { ls.remove(); }, 500); }
    });
  </script>
</body>
</html>
