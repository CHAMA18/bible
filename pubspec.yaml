name: bible_app
description: "Holy Bible – Divine Word & Devotions"
publish_to: "none"

version: 1.0.0+4

environment:
  sdk: ^3.6.0
dependencies:
  shared_preferences: ^2.0.0
  google_mobile_ads: ^6.0.0
  http: ^1.0.0
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.3
  go_router: ^16.2.0
  provider: ^6.1.2

  # Firebase
  firebase_core: 4.4.0
  firebase_auth: 6.1.4

  # Social Auth
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_logo_icon.png
  remove_alpha_ios: true
